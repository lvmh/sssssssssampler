[package]
name = "sssssssssampler"
version = "0.1.0"
edition = "2021"
description = "SP-1200 / S950 style sample rate & bit depth reducer"

[lib]
# Produces the shared library that hosts load as a VST3/CLAP plugin
crate-type = ["cdylib"]

[dependencies]
nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git" }

[profile.release]
opt-level = 3
lto = "thin"
strip = true
